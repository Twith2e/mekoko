<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're on the list</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f7; padding: 40px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);">

            <!-- Header -->
            <tr>
              <td style="background-color: #1a1a2e; padding: 32px 40px; text-align: center;">
                <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; font-family: 'Quicksand', sans-serif;">
                  {{.AppName}}
                </h1>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding: 40px;">
                <h2 style="margin: 0 0 16px; color: #1a1a2e; font-size: 22px; font-weight: 700; font-family: 'Quicksand', sans-serif;">
                  You're on the list.
                </h2>
                <p style="margin: 0 0 24px; color: #374151; font-size: 15px; line-height: 1.7;">
                  Thanks for signing up — we'll let you know the moment we launch. We're working hard to build something worth the wait.
                </p>
                <p style="margin: 0; color: #6b7280; font-size: 14px; line-height: 1.6;">
                  Stay tuned.
                </p>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding: 0 40px;">
                <hr style="margin: 0; border: none; border-top: 1px solid #e5e7eb;" />
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding: 24px 40px 32px; text-align: center;">
                <p style="margin: 0 0 4px; color: #9ca3af; font-size: 12px; line-height: 1.5;">
                  &copy; {{.Year}} {{.AppName}}. All rights reserved.
                </p>
                <p style="margin: 0; color: #9ca3af; font-size: 12px; line-height: 1.5;">
                  You're receiving this because <strong>{{.Email}}</strong> signed up for early access.
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
